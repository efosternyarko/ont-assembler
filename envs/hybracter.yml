name: enteric_hybracter
channels:
  - bioconda
  - conda-forge
  - nodefaults
dependencies:
  - python=3.11        # snakemake 7.x (required by hybracter) is incompatible with Python >=3.12
  - hybracter>=0.12.0
  - snakemake<8        # hybracter 0.12 rules use both mem_mb and mem; Snakemake 8 rejects this
